<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
<header>
    <h1>Cadastro de Produtos</h1>
</header>

<main>
    <div class="cadastro">
        <form class="formulario">
            <label for="nome">Nome do Produto:</label>
            <input type="text" id="nome" placeholder="Digite o nome do produto" required>

            <label for="preco">Preço:</label>
            <input type="number" id="preco" step="0.01" min="0" placeholder="R$ 0,00" required>

            <label>Quantidade em estoque:</label>
            <div id="campo-quantidade">
                <input type="number" id="quantidade" min="0" placeholder="0" required>
            </div>

            <label for="categoria">Categoria:</label>
            <select id="categoria" required>
                <option value="">Selecione uma categoria</option>
            </select>

            <label for="descricao">Descrição:</label>
            <textarea id="descricao" placeholder="Digite a descrição do produto"></textarea>

            <button class="enviar" type="submit">Cadastrar Produto</button>
            <button class="enviar" type="button" onclick="window.location.href='produtos.html'"
                    style="background:#888; margin-top: 10px;">Voltar</button>
        </form>
    </div>
</main>

<script src="cadastro.js"></script>
</body>
</html>
